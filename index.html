<!DOCTYPE HTML>
<html lang="JP">
	<head>
		<meta charset="UTF-8">

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200&display=swap" rel="stylesheet">

		<style>
h2 {
	border-left: thick solid rgb(0, 100, 150);
	border-left-width: 0.25em;

	border-bottom: solid rgb(0, 100, 150);
	border-bottom-width: 0.05em;

	font-family: 'Noto Serif JP', serif;
	font-size: 48px;
}

h3 {
	border-bottom: solid rgb(0, 100, 150);
	border-bottom-width: 0.05em;

	background-color: rgba(0, 100, 150, .1);

	font-family: 'Noto Serif JP', serif;
	font-size: 32px;
}

p {
	font-family: 'Noto Serif JP', serif;
	font-size: 24px;
}

.game {
	background-color: #eeffff;
}

.music {
	background-color: #eeeeff;
}

table{
	border: 2px solid rgb(0, 0, 0);
	font-family: 'Noto Serif JP', serif;
	letter-spacing: 1px;
}

caption{
	padding: 10px;
}

th,
td{
	border: 1px solid #000000;
	padding: 8px 6px;
	text-align: center;
}

		</style>
	</head>

	<body>
		<h2>hoge</h2>
		<h3>foo</h3>
		<p>bar</p>
		<p>fuga</p>

		<center>
			<table>
				<caption>
					Test Test!
				</caption>
				<colgroup>
					<col />
					<col span="1" class="game">
					<col span="1" class="music">
				</colgroup>
				<tr>
					<td></td>
					<th scope="col">Games</th>
					<th scope="col">Music</th>
				</tr>
				<tr>
					<th></th>
					<td>Pacman</td>
					<td>UNISON SQUARE GARDEN</td>
				</tr>
			</table>
		</center>
	</body>
</html>
